name: Run Build Tasks and Release

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    strategy:
      matrix:
        include:
          - tag: el9
            el: "9"
            platforms: linux/amd64
            arch: x86_64
          - tag: el9
            el: "9"
            platforms: linux/arm64
            arch: aarch64
          - tag: el8
            el: "8"
            platforms: linux/amd64
            arch: x86_64
          - tag: el8
            el: "8"
            platforms: linux/arm64
            arch: aarch64
          - tag: el7
            el: "7"
            platforms: linux/amd64
            arch: x86_64
          - tag: el7
            el: "7"
            platforms: linux/arm64
            arch: aarch64
          - tag: el7
            el: "7"
            platforms: linux/386
            arch: i686
          - tag: el7
            el: "7"
            platforms: linux/arm/v7
            arch: armv7hl
          - tag: el6
            el: "6"
            platforms: linux/amd64
            arch: x86_64
          - tag: el6
            el: "6"
            platforms: linux/386
            arch: i686
          - tag: el5
            el: "5"
            platforms: linux/amd64
            arch: x86_64
          - tag: el5
            el: "5"
            platforms: linux/386
            arch: i686

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Generate version-local.env
        run: |
          TAG=${{ github.ref_name }}
          BUILD_NUM=$(echo "$TAG" | grep -oE 'b[0-9]+' | tail -1)
          if [ -z "$BUILD_NUM" ]; then
            BUILD_NUM="b1"
          fi
          echo "WITH_OPENSSL=2" > version-local.env
          echo "PKGREL=$BUILD_NUM" >> version-local.env
          cat version-local.env

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GH_TOKEN }}

      - name: Run ${{ matrix.tag }}
        run: |
          docker run --platform ${{ matrix.platforms }} --rm \
            -v $(pwd)/version-local.env:/data/version-local.env \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.tag }}

      - name: Upload RPM artifacts
        uses: actions/upload-artifact@v7
        with:
          name: rpm-el${{ matrix.el }}-${{ matrix.arch }}
          path: output/*.rpm
          if-no-files-found: ignore

  release:
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: List downloaded artifacts
        run: |
          echo "Downloaded artifact directories:"
          find artifacts -mindepth 1 -maxdepth 1 -type d

      - name: Repackage artifacts with prefixed names
        run: |
          TAG=${{ github.ref_name }}
          mkdir -p release-assets
          for dir in artifacts/*/; do
            artifact_name=$(basename "$dir")
            new_name="openssh_${TAG}_${artifact_name}"
            echo "Packaging ${artifact_name} -> ${new_name}.zip"
            (cd "$dir" && zip -r "${GITHUB_WORKSPACE}/release-assets/${new_name}.zip" .)
          done
          echo "Release assets:"
          ls -la release-assets

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*.zip
          generate_release_notes: true
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
